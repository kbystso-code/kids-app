<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Kids Apps Launcher</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="title">アプリ ランチャー</div>
    <input id="q" class="search" type="search" placeholder="検索…" autocomplete="off" />
  </header>

  <main>
    <div id="grid" class="grid"></div>
  </main>

  <script>
    // まずはここに「旧リポのURL」を並べてテストします
    const apps = [
  {
    id: "wortschatz",
    title: "Wortschatz",
    desc: "単語ドリル",
    url: "https://kbystso-code.github.io/deutsch_wortschatz/"
  },
  {
    id: "typing",
    title: "Typing",
    desc: "タイピング練習",
    url: "https://kbystso-code.github.io/typing_app/"
  },
  {
    id: "artikel",
    title: "Artikel",
    desc: "冠詞ドリル（der/den/dem など）",
    url: "https://kbystso-code.github.io/artikel_drill/"
  },
  {
    id: "verb",
    title: "Verben",
    desc: "動詞ドリル（活用）",
    url: "https://kbystso-code.github.io/Verb_drill/"
  },
  {
    id: "kasus",
    title: "Kasus",
    desc: "格ドリル（主格/対格 など）",
    url: "https://kbystso-code.github.io/Kasus_drill/"
  },
  {
    id: "praeposition",
    title: "Präpositionen",
    desc: "前置詞ドリル（Dativ / Akkusativ）",
    url: "https://kbystso-code.github.io/praeposition/"
  }
  ]

    const STORAGE_KEY = "kids-app-study-log-v1";
    const PROGRESS_KEY = "kids-app-study-progress-v1";
    const grid = document.getElementById("grid");
    const q = document.getElementById("q");
    let studyLog = loadStudyLog();

    function render(list){
      grid.innerHTML = "";
      for (const a of list){
        const today = getTodayKey();
        const studyRecord = getStudyRecord(a.id);
        const studiedToday = Boolean(studyRecord);
        const panel = document.createElement("article");
        panel.className = "panel";
        const buttonLabel = studiedToday
          ? `
              <span class="studyButtonLabel">今日の学習完了</span>
              <span class="studyButtonDetail">${escapeHtml(formatStudyDate(studyRecord.date))} ・ 正解 ${escapeHtml(formatCorrectCount(studyRecord.correct))}</span>
            `
          : `<span class="studyButtonLabel">今日やった</span>`;
        const metaText = studiedToday
          ? "もう一度押すと今日の記録を取り消します"
          : `記録日: ${today} / 未学習`;

        panel.innerHTML = `
          <a class="card" href="${escapeHtml(a.url)}" target="_self" rel="noopener">
            <div class="cardTitle">${escapeHtml(a.title)}</div>
            <div class="cardDesc">${escapeHtml(a.desc ?? "")}</div>
          </a>
          <div class="studyRow">
            <button
              class="studyButton${studiedToday ? " isDone" : ""}"
              type="button"
              data-app-id="${escapeHtml(a.id)}"
              aria-pressed="${studiedToday ? "true" : "false"}"
            >
              ${buttonLabel}
            </button>
            <div class="studyMeta">${escapeHtml(metaText)}</div>
          </div>
        `;
        grid.appendChild(panel);
      }
    }

    grid.addEventListener("click", (event) => {
      const button = event.target.closest(".studyButton");
      if (!button) return;

      const appId = button.dataset.appId;
      if (!appId) return;

      toggleStudyStatus(appId);
    });

    function toggleStudyStatus(appId){
      const today = getTodayKey();
      studyLog[today] ??= {};

      if (studyLog[today][appId]) {
        delete studyLog[today][appId];
      } else {
        const progress = getTodayProgress(appId);
        studyLog[today][appId] = {
          date: today,
          correct: normalizeCorrectCount(progress?.correct),
          doneAt: new Date().toISOString()
        };
      }

      if (Object.keys(studyLog[today]).length === 0) {
        delete studyLog[today];
      }

      saveStudyLog();
      applySearch();
    }

    function isStudiedToday(appId){
      return Boolean(getStudyRecord(appId));
    }

    function getStudyRecord(appId){
      const today = getTodayKey();
      const value = studyLog[today]?.[appId];
      if (!value) return null;
      if (typeof value === "object") {
        return {
          date: value.date || today,
          correct: normalizeCorrectCount(value.correct)
        };
      }
      const progress = getTodayProgress(appId);
      return {
        date: today,
        correct: progress ? normalizeCorrectCount(progress.correct) : null
      };
    }

    function getTodayProgress(appId){
      const today = getTodayKey();
      const progress = loadStudyProgress();
      return progress[today]?.[appId] || null;
    }

    function getTodayKey(){
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function loadStudyLog(){
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function loadStudyProgress(){
      try {
        return JSON.parse(localStorage.getItem(PROGRESS_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function saveStudyLog(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(studyLog));
    }

    function normalizeCorrectCount(value){
      const num = Number(value);
      if (!Number.isFinite(num)) return 0;
      return Math.max(0, Math.floor(num));
    }

    function formatCorrectCount(value){
      return value === null ? "-" : String(normalizeCorrectCount(value));
    }

    function formatStudyDate(value){
      if (!value) return getTodayKey().replace(/-/g, "/");
      return String(value).replace(/-/g, "/");
    }

    function applySearch(){
      const key = q.value.trim().toLowerCase();
      if (!key) {
        render(apps);
        return;
      }

      render(apps.filter(a =>
        (a.title || "").toLowerCase().includes(key) ||
        (a.desc || "").toLowerCase().includes(key)
      ));
    }

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, c => ({
        "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
      }[c]));
    }

    q.addEventListener("input", applySearch);

    render(apps);
  </script>
</body>
</html>
